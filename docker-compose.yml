version: '3.8'

services:
  # -------------------------
  # 1. Base de Datos MySQL
  # -------------------------
  mysql_db:
    image: mysql:8.0
    container_name: poc_mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: mysecretpassword
      MYSQL_DATABASE: poc_oauth2_db
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmysecretpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # -------------------------
  # 2. Servidor de Autorización
  # -------------------------
  authorization-server:
    build:
      context: ./authorization-server
      dockerfile: Dockerfile
    container_name: poc_auth_server
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql_db:3306/poc_oauth2_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: mysecretpassword
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: "TU_CLIENT_ID"
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: "TU_CLIENT_SECRET"
    depends_on:
      mysql_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/.well-known/openid-configuration"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # -------------------------
  # 3. Servidor de Recursos
  # -------------------------
  resource-server:
    build:
      context: ./resource-server
      dockerfile: Dockerfile
    container_name: poc_resource_server
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql_db:3306/poc_oauth2_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: mysecretpassword
      JWT_ISSUER_URI: http://poc_auth_server:8080
    depends_on:
      mysql_db:
        condition: service_healthy
      authorization-server:
        condition: service_healthy

  # -------------------------
  # 4. Frontend Angular
  # -------------------------
  ag-prueba-front:
    build:
      context: ./ag-prueba-front
      dockerfile: Dockerfile
    container_name: poc_angular_frontend
    ports:
      - "4200:80"

volumes:
  db-data:

