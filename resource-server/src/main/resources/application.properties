# -------------------------
# PUERTO DEL SERVIDOR
# -------------------------
server.port=${SERVER_PORT:8081}

# -------------------------
# DATOS DE CONEXIÓN A MYSQL
# -------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql_db:3306/agprueba?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------------
# JPA / HIBERNATE
# -------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format-sql=true

# -------------------------
# OAUTH2 / JWT
# -------------------------
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://poc_auth_server:8080}

# -------------------------
# LOGGING
# -------------------------
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.security.oauth2=TRACE
