name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
      - prueba

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Crucial para que Sonar compare versiones

      # --- NUEVO: ANÁLISIS DE CÓDIGO ---
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Ya lo crea GitHub solo
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    # Este es el que debes añadir tú
          
      # --- CONTROL DE VERSIONES Y SBOM ---
      # Esto demuestra que conoces los componentes y vigilas cambios de versión
      - name: Generar Inventario SBOM y Check de Versiones
        run: |
          echo "### 📦 Reporte de Control de Componentes (SBOM)" >> $GITHUB_STEP_SUMMARY
          
          # Localizar el proyecto Java dinámicamente
          POM_PATH=$(find . -name "pom.xml" -not -path "*/target/*" | head -n 1)
          PROJECT_DIR=$(dirname "$POM_PATH")
          
          cd "$PROJECT_DIR"
          echo "Analizando componentes en: $PROJECT_DIR" >> $GITHUB_STEP_SUMMARY
          
          # Dar permisos al wrapper de Maven
          chmod +x ./mvnw
          
          # 1. Generar inventario de dependencias
          ./mvnw dependency:list -DoutputFile=lista_deps.txt
          
          # 2. Control de versiones (Detecta si hay cambios o actualizaciones)
          ./mvnw versions:display-dependency-updates > updates.txt
          
          # 3. Volcar resultados al Summary de GitHub
          echo '#### Resultado del escaneo de versiones:' >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          if grep -q "The following dependency updates are available" updates.txt; then
            grep -A 20 "The following dependency updates are available" updates.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "No se detectaron cambios de versión. El SBOM es íntegro." >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY

      # --- ANÁLISIS DE SEGURIDAD DE COMPONENTES (Opcional pero recomendado) ---
      - name: Dependency Check (Análisis de vulnerabilidades en SBOM)
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'oauth2-poc'
          path: '.'
          format: 'HTML'
      # --- 1. BUILD Y START ---
      - name: Build and start containers
        run: |
          sudo docker compose -f docker-compose.yml build
          sudo docker compose -f docker-compose.yml up -d
      
      # --- 3. STOP Y CLEANUP ---
      - name: Stop containers
        if: always()
        run: 
          sudo docker compose -f docker-compose.yml down