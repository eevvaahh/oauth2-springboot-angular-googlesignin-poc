name: CI/CD Pipeline

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop, prueba ]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- CONTROL DE VERSIONES Y SBOM ---
      - name: Generar Inventario SBOM y Check de Versiones
        run: |
          echo "### 📦 Reporte de Control de Componentes (SBOM)" >> $GITHUB_STEP_SUMMARY
          
          # Localizar el proyecto Java dinámicamente
          POM_PATH=$(find . -name "pom.xml" -not -path "*/target/*" | head -n 1)
          PROJECT_DIR=$(dirname "$POM_PATH")
          cd "$PROJECT_DIR"
          
          echo "Directorio analizado: $PROJECT_DIR" >> $GITHUB_STEP_SUMMARY
          chmod +x ./mvnw
          
          # 1. Generar inventario de dependencias (SBOM)
          ./mvnw dependency:list -DoutputFile=lista_deps.txt
          
          # 2. Control de cambios de versión
          ./mvnw versions:display-dependency-updates > updates.txt
          
          # 3. Publicar en el Summary
          echo '#### Resultado del escaneo de versiones:' >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          if grep -q "The following dependency updates are available" updates.txt; then
            grep -A 20 "The following dependency updates are available" updates.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "No se detectaron cambios de versión. El SBOM es íntegro." >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY

      # --- SONARCLOUD SCAN (Calidad y Seguridad) ---
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=eevvaahh_oauth2-springboot-angular-googlesignin-poc
            -Dsonar.organization=eevvaahh
            -Dsonar.java.binaries=.
            
      # --- 1. BUILD Y START ---
      - name: Build and start containers
        run: |
          sudo docker compose -f docker-compose.yml build
          sudo docker compose -f docker-compose.yml up -d
      
      # --- 3. STOP Y CLEANUP ---
      - name: Stop containers
        if: always()
        run: 
          sudo docker compose -f docker-compose.yml down