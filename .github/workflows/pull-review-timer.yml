name: PR Timer – Cierre automático si no hay 2 aprobaciones

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  auto-close:
    runs-on: self-hosted
    permissions:
      pull-requests: write

    steps:
      - name: Espera 1 minuto
        run: |
          echo "Esperando 60 segundos antes de verificar aprobaciones..."
          sleep 60

      - name: Verificar aprobaciones y cerrar si es necesario
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Obtener las revisiones de la PR
          # Usamos jq para filtrar solo las que dicen "APPROVED" y contarlas
          APPROVALS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
            | jq '[.[] | select(.state == "APPROVED")] | length')

          echo "La PR tiene $APPROVALS aprobaciones."

          # 2. Verificar si se debe cerrar (si hay menos de 2 y no está mergeada)
          if [ "$APPROVALS" -lt 2 ]; then
            echo "Menos de 2 aprobaciones detectadas ($APPROVALS). Cerrando PR..."
            
            curl -X PATCH \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} \
              -d '{"state":"closed"}'
          else
            echo "PR aprobada por 2 o más personas. Se mantiene abierta."
          fi