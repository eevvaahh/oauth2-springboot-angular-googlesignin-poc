name: PR Timer – Cierre automático (Finalización Exitosa)
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  auto-close:
    runs-on: self-hosted
    permissions:
      pull-requests: write
    steps:
      - name: Espera de 1 minuto
        run: |
          echo "Iniciando espera de 180 segundos..."
          sleep 180

      - name: Validar y Cerrar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Obtener autor
          PR_AUTHOR=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} \
            | jq -r '.user.login')

          # 2. Contar aprobaciones únicas
          APPROVALS=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
            | jq "[.[] | select(.state == \"APPROVED\" and .user.login != \"$PR_AUTHOR\")] | map(.user.login) | unique | length")

          echo "Aprobaciones encontradas: $APPROVALS"

          if [ "$APPROVALS" -lt 2 ]; then
            echo "Cerrando PR por falta de aprobaciones (esto es un comportamiento esperado)..."
            
            # Comando para cerrar
            curl -s -X PATCH \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} \
              -d '{"state":"closed"}'
            
            echo "✅ PR cerrada correctamente. El workflow termina con éxito porque cumplió su función."
          else
            echo "✅ Se mantendrá abierta: 2 o más aprobaciones detectadas."
          fi
          # Eliminamos el 'exit 1' para que siempre salga el check verde