name: PR Timer – Cierre automático por falta de aprobaciones
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  auto-close:
    runs-on: self-hosted
    permissions:
      pull-requests: write
    steps:
      - name: Espera 1 minuto
        run: |
          echo "Iniciando cronómetro de 60 segundos para obtener 2 aprobaciones..."
          sleep 60

      - name: Verificar aprobaciones y cerrar si no cumple
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Obtener el número de aprobaciones únicas
          APPROVALS=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
            | jq '[.[] | select(.state == "APPROVED")] | map(.user.login) | unique | length')

          echo "Aprobaciones encontradas: $APPROVALS"

          # 2. Si las aprobaciones son menos de 2, cerrar la PR
          if [ "$APPROVALS" -lt 2 ]; then
            echo "Menos de 2 aprobaciones recibidas. Cerrando PR..."
            curl -X PATCH \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} \
              -d '{"state":"closed"}'
            
            # Opcional: Dejar un comentario explicando por qué se cerró
            curl -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
              -d '{"body":"PR cerrada automáticamente: No se obtuvieron las 2 aprobaciones requeridas en el plazo de 1 minuto."}'
          else
            echo "Objetivo alcanzado: 2 o más aprobaciones detectadas."
          fi