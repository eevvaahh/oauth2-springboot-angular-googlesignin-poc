name: PR Timer – Cierre automático en 1 minuto

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  auto-close:
    runs-on: self-hosted

    permissions:
      pull-requests: write

    steps:
      - name: Espera 1 hora
        run: |
          echo "Esperando 1 hora antes de verificar la PR..."
          sleep 3600

      - name: Cerrar PR si no se fusionó
        if: github.event.pull_request.merged == false
        run: |
          echo "Cerrando PR automáticamente por límite de tiempo..."
          curl -X PATCH \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} \
            -d '{"state":"closed"}'
