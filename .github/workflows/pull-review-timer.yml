name: Pull Review Timer

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  measure-review-time:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Record PR opened time
      if: github.event.action == 'opened'
      run: echo "PR_OPENED_TIME=$(date +%s)" >> $GITHUB_ENV

    - name: Simulate review
      if: github.event.action == 'opened' || github.event.action == 'synchronize'
      run: |
        echo "Simulating code review..."
        sleep 5  # aquí puedes cambiar el tiempo para simular duración del review
        echo "Review approved"

    - name: Record PR approved time
      if: github.event.action == 'opened' || github.event.action == 'synchronize'
      run: |
        PR_APPROVED_TIME=$(date +%s)
        echo "PR_APPROVED_TIME=$PR_APPROVED_TIME" >> $GITHUB_ENV
        DURATION=$((PR_APPROVED_TIME - PR_OPENED_TIME))
        echo "Pull Review Duration: $DURATION seconds"
