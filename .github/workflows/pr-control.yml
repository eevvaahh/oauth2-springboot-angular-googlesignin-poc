# .github/workflows/pr-control.yml

name: Control de Time-to-Merge (WP 2.4)

on:
  schedule:
    # MODIFICACIÓN CLAVE: Se ejecuta CADA 5 MINUTOS (para prueba).
    - cron: '*/5 * * * *' 
  workflow_dispatch: 
    
jobs:
  close-old-prs:
    runs-on: self-hosted 
    permissions:
      pull-requests: write # Necesario para cerrar la PR

    steps:
      - name: Buscar y cerrar PRs que no cumplieron el plazo (5 minutos de prueba)
        uses: actions/stale@v9
        with:
          # Si la PR lleva más de 5 minutos (0.0035 días), se cierra.
          days-before-close: 0.0035 
          days-before-stale: -1 # Va directo al cierre
          
          # El mensaje de notificación de fallo (si excede el tiempo)
          stale-pr-message: |
            ❌ **[FALLO DE CUMPLIMIENTO]** ❌
            Esta Pull Request ha excedido el límite de **5 minutos** establecido para la revisión (WP 2.4). El requisito de *Time-to-Merge* NO SE HA CUMPLIDO. Se cierra automáticamente.
            
          close-pr-label: 'time-expired'
          repo-token: ${{ secrets.GITHUB_TOKEN }}