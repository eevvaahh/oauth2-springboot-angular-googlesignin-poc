name: PR Timer (WP 2.4 - Cierre por 1 Minuto)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  check-and-close:
    runs-on: self-hosted
    
    permissions:
      contents: read
      pull-requests: write 

    steps:
      - name: Mensaje de Advertencia
        run: echo "ADVERTENCIA: Este paso bloquea el runner durante 1 minuto para la prueba."

      - name: Esperar 1 Minuto (Tiempo Límite de Revisión)
        run: |
          echo "Durmiendo por 60 segundos (1 minuto)..."
          sleep 60

      - name: Verificar y Cerrar PR si no fue fusionada
        uses: actions/stale@v9
        with:
          days-before-close: 0        # ← ENTERO válido
          days-before-stale: -1
          stale-pr-message: |
            ❌ **[REGLA DE TIEMPO INCUMPLIDA - LÍMITE DE 1 MINUTO]** ❌
            Esta Pull Request ha excedido el límite de 1 minuto establecido. El requisito de *Time-to-Merge* NO SE HA CUMPLIDO. Se cierra automáticamente.
          close-pr-label: 'time-expired'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
